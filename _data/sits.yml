      quote: "Jordan and The Admiral were absolute stars. The house was spotless, the dogs were clearly doted on, and they even left a little carved figure in the garden. We came home to happy dogs and a home that felt cared for. Cannot recommend them highly enough."
      name: "Sarah & Mark, Albrighton"
    photos:
      slideshow:
        - "albrighton/trixie-garden.jpg"
        - "albrighton/buddy-walk.jpg"
        - "albrighton/village.jpg"
      album_url: ""
