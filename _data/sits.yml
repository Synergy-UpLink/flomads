# ============================================================
# FLOMADS — Sitter Reference Data
# ============================================================
# This file drives the hidden references page.
# Add new sits to the `sits` list (most recent first).
# Add standalone testimonials to `testimonials`.
# Add contact methods to `contact`.
# ============================================================

# ── Page access controls ─────────────────────────────────────
access:
  require_slug: true          # false = secret URL alone is enough
  require_password: true      # false = no password prompt
  password: "flomads2024"     # change this!

# ── Contact methods ──────────────────────────────────────────
# type options: email | phone | facebook | twitter | instagram
#               trustedhousesitters | website | whatsapp | other
# label: display text
# value: the address/handle/url
# primary: true = shown prominently at top, false = listed below
contact:
  - type: trustedhousesitters
    label: "TrustedHouseSitters Profile"
    value: "https://www.trustedhousesitters.com/house-and-pet-sitters/united-states-of-america/colorado-springs/"
    primary: true
  - type: email
    label: "jordan@flomads.com"
    value: "jordan@flomads.com"
    primary: true
  # - type: phone
  #   label: "+1 (555) 000-0000"
  #   value: "+15550000000"
  #   primary: false
  # - type: facebook
  #   label: "The Flomads on Facebook"
  #   value: "https://facebook.com/theflomads"
  #   primary: false

# ── Sits ─────────────────────────────────────────────────────
# Fields:
#   id:           unique slug (used for anchor links)
#   location:     city/region
#   country:      country name
#   flag:         emoji flag
#   dates:        human-readable date range
#   lat/lng:      for the map pin
#   current:      true = highlighted as current sit
#   owners:       first names of the homeowners
#   testimonial:
#     quote:      their words (no surrounding quotes needed)
#     name:       how they want to be credited
#   photos:
#     slideshow:  list of local image paths (relative to /assets/images/sits/)
#     album_url:  link to a Google Photos / Flickr / etc. album
#     album_label: button label for the album link
#   animals:      list of animal profiles (see schema below)
#
# Animal fields:
#   name, species, breed, age, photo (path under /assets/images/sits/)
#   personality, care_notes, challenges

sits:

  - id: albrighton-2026
    location: "Albrighton, Shropshire"
    country: "England, UK"
    flag: "🇬🇧"
    dates: "February – June 2026"
    lat: 52.632
    lng: -2.248
