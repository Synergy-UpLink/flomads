<div id="now-map" style="height: 400px;" class="now-map">
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<script>
    // Initialize map centered on Albrighton, Shropshire
    const map = L.map('now-map').setView([52.6353685, -2.2781400], 12);

	// OPTION 2: OpenStreetMap Standard (clean, neutral)
	L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
	  attribution: '© OpenStreetMap contributors',
	  maxZoom: 19
	}).addTo(map);

    const svgPin = `
  <svg width="44" height="50" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
<path
   style="fill:var(--cream);fill-opacity:1;stroke:var(--gold);stroke-width:19.2;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:none;stroke-opacity:1"
   d="M 60.615214,78.08295 61.885685,264.5114 474.21531,263.87616 314.55486,171.04763 474.62378,77.583871 Z" />
<path
   d="m 45.89625,21.80375 c -5.863,0 -10.6325,4.7695 -10.6325,10.6325 0,5.863 4.7695,10.63125 10.6325,10.63125 5.863,0 10.63125,-4.76825 10.63125,-10.63125 0,-5.863 -4.76825,-10.6325 -10.63125,-10.6325 z"
   style="display:inline;fill:var(--red);fill-opacity:1;stroke:#000000;stroke-width:0.99968;stroke-dasharray:none;stroke-opacity:1"/>
<path
   d="m 45.89625,1.40625 c -17.109,0 -31.03,13.92 -31.03,31.03 0,13.537 8.71725,25.07075 20.83125,29.29875 v 441.47125 c 0,5.632 4.56675,10.2 10.19875,10.2 5.632,0 10.19875,-4.53685 10.19875,-10.2 v -434.1 -7.37 c 12.114,-4.23 20.83125,-15.763 20.83125,-29.3 -10e-4,-17.111 -13.921,-31.03 -31.03,-31.03 z m 0,20.3975 c 5.863,0 10.63125,4.7695 10.63125,10.6325 0,5.863 -4.76825,10.63125 -10.63125,10.63125 -5.863,0 -10.6325,-4.76825 -10.6325,-10.63125 0,-5.863 4.7695,-10.6325 10.6325,-10.6325 z"
   style="display:inline;fill:var(--navy);fill-opacity:1;stroke:#000000;stroke-width:0.99968;stroke-dasharray:none;stroke-opacity:1"/>
  </svg>
`;

    const customIcon = L.divIcon({
        html: svgPin,
        iconSize: [40, 50],
        iconAnchor: [20, 50],
        popupAnchor: [0, -50],
        className: 'now-custom-marker'
    });
    /* Albrighton */
    L.marker([52.6353685, -2.2781400], { icon: customIcon })
        .bindPopup('<div class="now-map-popup"><strong>Albrighton</strong></div>')
        .addTo(map);
    /* Colorado Springs */
    L.marker([38.8756732,-104.9168954], { icon: customIcon })
        .bindPopup('<div class="now-map-popup"><strong>Colorado, US</strong></div>')
        .addTo(map);
    /* Cancun, MX */
    L.marker([21.1230253,-86.9388049], { icon: customIcon })
        .bindPopup('<div class="now-map-popup"><strong>Cancun, MX</strong></div>')
        .addTo(map);
    /* Todos Santos */
    L.marker([23.4594298,-110.2566555], { icon: customIcon })
        .bindPopup('<div class="now-map-popup"><strong>Todos Santos, MX</strong></div>')
        .addTo(map);
    /* Cuenca */
    L.marker([-2.8922685,-79.0305797], { icon: customIcon })
        .bindPopup('<div class="now-map-popup"><strong>Cuenca, EC</strong></div>')
        .addTo(map);
    /* Dota, CR */
    L.marker([9.5850098,-84.0381806], { icon: customIcon })
        .bindPopup('<div class="now-map-popup"><strong>Santa María, CR</strong></div>')
        .addTo(map);
    /* Exuma BS */
    L.marker([24.1137938,-76.7958054], { icon: customIcon })
        .bindPopup('<div class="now-map-popup"><strong>Exuma, BS</strong></div>')
        .addTo(map);
    /* La Fortuna */
    L.marker([10.4731966,-85.0506821], { icon: customIcon })
        .bindPopup('<div class="now-map-popup"><strong>La Fortuna, CR</strong></div>')
        .addTo(map);
    /* Manchester, VT */
    L.marker([43.1656731,-73.1095669], { icon: customIcon })
        .bindPopup('<div class="now-map-popup"><strong>Manchester, US</strong></div>')
        .addTo(map);
        /* Indian Harbour Beach, FL */
    L.marker([28.1924975,-80.5677636], { icon: customIcon })
        .bindPopup('<div class="now-map-popup"><strong>Indian Harbour Beach, US</strong></div>')
        .addTo(map);
</script>

    }

    .now-custom-marker {
        filter: drop-shadow(0 3px 8px rgba(0, 0, 0, 0.4));
        transition: transform 0.2s ease;
    }

    .now-custom-marker:hover {
        transform: scale(1.3);
    }

    .now-map:hover {
        filter: brightness(1) contrast(1.25);
    }

    .now-map-info {

    }

    }

    .now-map-info p {

    /* Leaflet control styling */
    .leaflet-control-attribution {
        background: var(--navy) !important;

    }

    .leaflet-control-zoom a {
        background: var(--navy) !important;

    .leaflet-control-zoom a:hover {

    /* Override Leaflet's default popup styling */
