# ── ADD THIS TO _config.yml ───────────────────────────────────
# Paste the `collections:` block and the two new `defaults` entries
# into your existing _config.yml. The plugins line is already there
# in v2; just add jekyll-feed if you want an RSS feed.

collections:
  blog:
    output: true
    permalink: /blog/:slug/
    sort_by: date
  articles:
    output: true
    permalink: /articles/:slug/
    sort_by: date

# Add these two entries inside your existing `defaults:` list:
#
#   - scope:
#       path: ""
#       type: "blog"
#     values:
#       layout: "post"
#       collection_label: "Blog"
#       collection_path: "/blog/"
#
#   - scope:
#       path: ""
#       type: "articles"
#     values:
#       layout: "post"
#       collection_label: "Articles"
#       collection_path: "/articles/"
#
# Optional — add jekyll-feed to plugins for RSS:
#   - jekyll-feed
