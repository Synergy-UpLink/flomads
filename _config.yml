title: "The Flomads"
tagline: "noMADS going with the FLO"
description: "Two humans, one pirate hedgehog, and the open road — living full-time across the globe one petsit at a time."
url: "https://flomads.com"
baseurl: ""

author: Jordan
name: "The Flomads"

# Collections
collections:
  blog:
    output: true
    permalink: /blog/:slug/
    sort_by: date
  articles:
    output: true
    permalink: /articles/:slug/
    sort_by: date

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: "sit-with-us"
    values:
      sitemap: false
      robots: "noindex, nofollow"
  - scope:
      path: ""
      type: "blog"
    values:
      layout: "post"
      collection_label: "Blog"
      collection_path: "/blog/"
  - scope:
      path: ""
      type: "articles"
    values:
      layout: "post"
      collection_label: "Articles"
      collection_path: "/articles/"

# Exclude hidden reference page from sitemap
defaults_sitemap_exclude:
  - sit-with-us

# Build settings
markdown: kramdown
highlighter: rouge
permalink: pretty

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - node_modules/

# Plugins (safe for GitHub Pages)
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

